# .github/workflows/backup.yml
name: Daily Backup

on:
  # Run every day at 6 AM UTC (1 AM EST / 2 AM EDT)
  schedule:
    - cron: "0 6 * * *"

  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run backup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node backup.js

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: backup-*/
          retention-days: 30

      # Touch a file and commit so the scheduled run counts as repo activity.
      # Otherwise GitHub disables the cron after 60 days of no commits, even
      # though the workflow is running daily.
      - name: Record run timestamp
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/last-backup.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-backup.txt
          git commit -m "chore: record backup run [skip ci]" || exit 0
          git push
